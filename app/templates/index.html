<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Decision Copilot</p>
        <h1>{{ app_name }}</h1>
        <p class="lede">
          把问题、背景、预算、地点、时间、链接一股脑写进来，我负责拆、查、劝、下判断。
        </p>
      </section>

      <section class="workspace">
        <form id="run-form" class="panel form-panel">
          <label>
            <span>把情况直接说完整</span>
            <p class="form-hint">
              不用分栏填表。预算、地点、时间、链接、你纠结的点，都可以直接写在这一段里。
            </p>
            <textarea
              name="question"
              rows="10"
              placeholder="比如：这周六我想去杭州看展，来回预算 400 左右，活动页 https://example.com/event ，但我最近有点累，还得周一上班，这趟到底值不值？"
            ></textarea>
          </label>

          <button class="primary" type="submit">开始判断</button>
        </form>

        <section class="panel result-panel">
          <div class="status-strip">
            <span id="run-status">待命中</span>
            <span id="run-category" class="tag ghost">未分类</span>
          </div>

          <div id="timeline" class="timeline">
            <p class="muted">时间线会在这里冒出来。</p>
          </div>

          <section id="clarification-box" class="clarification hidden">
            <h2>补一句就好</h2>
            <p id="clarification-question"></p>
            <form id="clarification-form">
              <textarea name="answer" rows="3" placeholder="直接补一句背景，或者贴一个链接也行。"></textarea>
              <button class="secondary" type="submit">继续分析</button>
            </form>
          </section>

          <section id="verdict-box" class="verdict hidden">
            <h2>最终 verdict</h2>
            <div class="verdict-head">
              <span id="verdict-label" class="tag"></span>
              <span id="verdict-confidence"></span>
            </div>
            <p id="verdict-punchline" class="punchline"></p>

            <div class="columns">
              <div>
                <h3>能做的理由</h3>
                <ul id="why-yes"></ul>
              </div>
              <div>
                <h3>劝你别冲的理由</h3>
                <ul id="why-no"></ul>
              </div>
            </div>

            <div class="columns">
              <div>
                <h3>主要风险</h3>
                <ul id="top-risks"></ul>
              </div>
              <div>
                <h3>更优替代</h3>
                <p id="best-alternative"></p>
              </div>
            </div>

            <div class="callout">
              <h3>下一步</h3>
              <p id="next-step"></p>
              <p id="follow-up" class="muted"></p>
            </div>
          </section>

          <section id="evidence-box" class="evidence hidden">
            <div class="columns">
              <div>
                <h3>查到的依据</h3>
                <p id="research-summary"></p>
                <ul id="research-points"></ul>
              </div>
              <div>
                <h3>反面意见</h3>
                <p id="skeptic-summary"></p>
                <ul id="skeptic-points"></ul>
              </div>
            </div>
          </section>

          <section id="feedback-box" class="feedback hidden">
            <h2>事后复盘</h2>
            <form id="feedback-form">
              <div class="grid">
                <label>
                  <span>最后你怎么做的</span>
                  <input type="text" name="actual_action" placeholder="比如：还是去了 / 最后没买" />
                </label>
                <label>
                  <span>满意度（1-5）</span>
                  <input type="number" name="satisfaction_score" min="1" max="5" value="3" />
                </label>
              </div>
              <div class="grid">
                <label>
                  <span>后悔度（1-5）</span>
                  <input type="number" name="regret_score" min="1" max="5" value="2" />
                </label>
                <label>
                  <span>备注</span>
                  <input type="text" name="note" placeholder="比如：贵倒是不贵，就是买了也没怎么用。" />
                </label>
              </div>
              <button class="secondary" type="submit">写进长期记忆</button>
            </form>
            <p id="feedback-state" class="muted"></p>
          </section>
        </section>
      </section>
    </main>

    <script src="{{ url_for('static', path='app.js') }}"></script>
  </body>
</html>
